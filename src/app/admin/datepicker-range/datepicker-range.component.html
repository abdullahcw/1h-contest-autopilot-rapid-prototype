<div class="main-container">
  <mat-toolbar class="small-toolbar" color="primary">
    <div>
      {{titleToBeDisplayed}}
    </div>
  </mat-toolbar>
  <mat-progress-bar class="progress-bar" mode="indeterminate" *ngIf="is_loading"></mat-progress-bar>
  <section class="add-group-content" [ngClass]="{'disabled-style': is_loading}">
    <form #setDateForm="ngForm">
      <div class="container">
        <div class="form-group department-container date-picker">
          <label class="label roboto_regular" for="startDate"> {{ 'start_date' | translate }}</label>
          <input matInput class="holder form-inputs calendar-input" [matDatepicker]="startDatePicker"
            placeholder="MM/DD/YYYY" name="startDate" (click)="startDatePicker.open()" (open)="isDatePickerOpen"
            [(ngModel)]="startDate" [max]="maxDate" (keydown)="isDatePickerOpen = true;"
            (dateChange)="startDateChanged(startDate)" readonly [min]="minDate" [required]="isRequired">
          <mat-datepicker-toggle matPrefix [for]="startDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #startDatePicker></mat-datepicker>
        </div>

        <div class="form-group department-container date-picker">
          <label class="label roboto_regular" for="endDate"> {{ 'end_date' | translate }}</label>
          <input matInput class="holder form-inputs calendar-input" [matDatepicker]="endDatepicker"
            placeholder="MM/DD/YYYY" name="endDate" (click)="endDatepicker.open()" (open)="isDatePickerOpen"
            [min]="startDate" (keydown)="isDatePickerOpen = true;" [(ngModel)]="endDate" readonly [max]="maxDate"
            (dateChange)="endDateChanged(endDate)" [required]="isRequired">
          <mat-datepicker-toggle matPrefix [for]="endDatepicker"></mat-datepicker-toggle>
          <mat-datepicker #endDatepicker></mat-datepicker>
        </div>
      </div>
      <div class="button-row">
        <div class="btn-right">
          <button type="button" mat-button class="cancel-button" tabindex="-1" (click)="cancelDialog()">
            {{ 'cancel_uppercase' | translate }}</button>
        </div>
        <div>
          <button type="submit" mat-button (click)="send()" [disabled]="!setDateForm.valid || !setDateForm.dirty">
            <div> {{ 'done_uppercase' | translate }} </div>
          </button>
        </div>
      </div>
    </form>
  </section>
</div>
