<mat-toolbar-row class="header">
  <div class="game-title-conatiner" [ngClass]="{'disable-game-change': game?.is_shop_game}">
    <div class="game-icon-container" (click)="openGameIconPicker()">
      <img class="game-icon" alt="" [src]="game?.game_logo" onError="this.src='/assets/img/default.png'">
      <div class="game-icon-overlay" *ngIf="!game?.is_shop_game">
        <mat-icon>edit</mat-icon>
      </div>
    </div>
    <div class="game-name-holder">
      <input type="text" class="game-name" [(ngModel)]="game && game.game_name" (keyup.enter)="$event.target.blur()"
        placeholder="{{'game_name' | translate }}" (change)="hasChanged = true" (keypress)="noSpace($event)"
        (blur)="hasChanged ? gameNameValidation('game_name', game?.game_name) : false" minlength="1" maxlength="45">
      <mat-icon class="edit-input-icon" *ngIf="!game?.is_shop_game">edit</mat-icon>
    </div>
  </div>
  <div class="game-option-container">
    <div class="game-type-wrapper">
      <mat-icon class="game-type-icon">{{game?.game_type == 1 ? 'person' : 'group' }}</mat-icon>
      <div class="game-type" style="cursor: default !important;">{{game?.game_type == 1 ? ('single_player' | translate)
        :('multiplayer' | translate)}}
      </div>
    </div>
    <div class="divider" *ngIf="game?.game_type == 1"></div>
    <div *ngIf="isMobile && game?.game_type == 1" class="pathwayMobile" (click)="openPathwayPopup()">
      <div class="pathwayIcon">
        <svg id="Layer_1" style="margin: 0 4px 0px 3px;" data-name="Layer 1" width="17" height="15"  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88.9 64.8">

        </svg>
      </div>
    </div>
    <div class="game-pathway-container" *ngIf="!isMobile && game?.game_type == 1">      
      <app-search-multiselect  [items]="gamePathwaysSource" placeholderText="{{('select_pathway' | translate)}}" [isRequired]="false"
          [shouldAllowSearch]="false" [forPathwayList]="true" (closedPanel)="onPathwayClosed($event)" (selectedItems)="onPathwaySelected($event)" [disabled]="false">
      </app-search-multiselect>
    </div>
    <div class="divider"></div>
    <div *ngIf="isMobile" class="categporyMobile"  (click)="openCategoryPopup()">
      <div class="categoryIcon" [ngClass]="{'categoryIconRed': game?.game_category_name == 'Uncategorized'}">
        <svg class="icon assets-icon" style="margin:0px 4px 2px 4px"
      xmlns="http://www.w3.org/2000/svg" width="15" height="19" viewBox="0 0 17 17">

      </g>
      </svg>
      </div>
      

    </div>
    <div  class="game-category-container" *ngIf="!isMobile">
      <app-search-select *ngIf="gameCategoriesSource.length" [items]="gameCategoriesSource" [selectedId]="game && game.game_category_id"
                placeholderText="{{('game_category_placeholder' | translate)}}" (change)="onSelectionChanged($event)"
                [isRequired]="true"
                [shouldAllowSearch]="false"
                [applyCustomWidthToOverlay]="true"
                [disabled]="game?.is_shop_game"
                [disabledArrow]="game?.is_shop_game">
      </app-search-select>
    </div>
      <div class="lang-wraper " [ngClass]="{'disabled-style': isLoadingLanguage }" *ngIf="game?.game_type == 1">
      <div class="lang-switch-wraper">
        <app-language-selection [game_id]="game.game_id" [items]="selectedLang" [selectedId]="selected" (change)="setLang($event)" [defaultLangId]="game?.default_lang_id" style="color: #fff;"></app-language-selection>
      </div>
    </div>
    <div class="lang-wraper" [ngClass]="{'disabled-style': isLoadingLanguage}" *ngIf="game?.game_type == 1">
    <button class="lang-edit-btn" *ngIf="viewbutton">
      <mat-icon  (click)="selectLanguage()" [ngClass]="{'disabled-style': isLoadingLanguage}" >edit</mat-icon>
    </button> 
    </div>
    <div>
      <button *ngIf="viewbutton" mat-raised-button class="custom-button-wrapper robotoRegular"
        (click)="nextButtonClicked()">
        <div class="customeBtnDiv">
          <span
            class="custom-button">{{game?.game_type == 2 ? ('profile_uppercase' | translate) : ('preview_uppercase' | translate)}}
          </span>
          <img class="arrow-right-icon" src="assets/img/right_arrow.png" alt="">
        </div>
      </button>
      <div *ngIf="!viewbutton" class="pinimg">
        <div class="pingame-actions-unpin" matTooltipPosition="below" *ngIf="game?.game_type == 1 && game.is_pinned" (click)="pinGame(game)" [matTooltip]="showPinStatus(game)"
          matTooltipPosition="below" [ngClass]="{'disabled-style': isLoading}">
          <img src="/assets/img/pin_icon.png" alt="" (mouseenter)="showUnpin=true" *ngIf="!showUnpin"/>
          <img src="/assets/img/unpin_icon.png" alt="" (mouseleave)="showUnpin=false" *ngIf="showUnpin" />
        </div>
        <div class="pingame-actions-pin" matTooltipPosition="below" *ngIf="game?.game_type == 1 && !game.is_pinned" (click)="pinGame(game)"
          [matTooltip]="showPinStatus(game)" matTooltipPosition="below" [ngClass]="{'disabled-style': isLoading}">
          <img src="/assets/img/pin_game_builder.png" alt=""/>
        </div>
        <button 
          [disabled]="(validFormRef && !validFormRef.valid) || !validStatusRef || !textEditorScenarioRef || !textEditorInfomationRef"
          mat-raised-button class="custom-button-wrapper robotoRegular" (click)="nextButtonClicked()">
          <div class="customeBtnDiv">
            <span class="custom-button">{{'done_uppercase' | translate}} </span>
            <img class="arrow-right-icon" src="assets/img/right_arrow.png" alt="">
          </div>
        </button>
      </div>
    </div>
  </div>
</mat-toolbar-row>
<input type="file" onclick="this.value=null" #imgInput id="upload_image" [hidden]="true" accept="image/*"
  (change)="fileChangeEvent($event)">
