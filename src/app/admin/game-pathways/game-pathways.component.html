<div class="main_container">
    <div class="pathway-wrapper">
      <mat-card class="container-card">
        <mat-card-header>
          <mat-toolbar class="toolbar">
            <mat-toolbar-row>
              <span class="title"><span class=""> {{'showing_all_game_pathways' | translate}}</span></span>
              <span class="spacer"></span>
              <button class="add-group addEntity" *ngIf="pathwayPermission?.add"
                matTooltip="{{'add_new_pathway' |translate}}" matTooltipPosition="below"
                (click)="presentPathwayPopup(null,translate.instant('add_new_pathway'),'addPathway')" mat-fab>
                <mat-icon>add</mat-icon>
              </button>
            </mat-toolbar-row>
          </mat-toolbar>
        </mat-card-header>
        <mat-progress-bar class="progress-bar" mode="indeterminate" *ngIf="is_loading"></mat-progress-bar>
        <mat-card-content>
          <table mat-table [dataSource]="dataSource" matSort matSortDirection="asc" matSortDisableClear>
            <ng-container matColumnDef="no">
              <th mat-header-cell *matHeaderCellDef style="min-width: 60px;width: 140px;height: 46px;padding-left: 34px;">
                {{'no' | translate}}.</th>
              <td mat-cell *matCellDef="let pathway = index">
                {{pathway + 1}}
              </td>
            </ng-container>
            <ng-container matColumnDef="pathwayName">
              <th mat-header-cell *matHeaderCellDef style="width: 350px;">
                {{'pathway_name' | translate}}</th>
              <td mat-cell *matCellDef="let pathway">
                {{pathway.pathway_name}}
              </td>
            </ng-container>
            <ng-container matColumnDef="gameCount">
              <th mat-header-cell *matHeaderCellDef style="max-width:100px;">
                {{'no_of_games' | translate}}</th>
              <td mat-cell *matCellDef="let pathway">
                <app-numbers [value]="pathway.games_count"></app-numbers>
              </td>
            </ng-container>
            <ng-container matColumnDef="action">
              <th mat-header-cell *matHeaderCellDef style="text-align: right;width: 100px;">
                {{'delete' | translate}}
              </th>
              <td mat-cell *matCellDef="let pathway" (click)="$event.stopPropagation();">
                <img src="/assets/img/icon/delete-category-icon.png" alt="" class="delete-icon"
                *ngIf="pathwayPermission && pathwayPermission?.delete"
                  (click)="pathwayDeletion(pathway)">
              </td>
            </ng-container>
  
            <tr mat-header-row *matHeaderRowDef="displayedColumns sticky: true" class="header"></tr>
            <tr mat-row *matRowDef="let pathway; columns: displayedColumns;"
              (click)="pathwayPermission?.add  ? presentPathwayPopup(pathway, translate.instant('edit_pathway'), 'editPathway') : ''"  
              [ngClass]="{'selected-row-styling': (selection && selection.selected.indexOf(pathway)-1),
              'notHandCursor' : !pathwayPermission.edit}">
            </tr>
          </table>

          <div class="no_messages" *ngIf="!dataSource?.data.length">
            <p *ngIf="is_loading">{{('please_wait' | translate)}}</p>
            <p *ngIf="!is_loading">{{('click' | translate)}} <strong>'+'</strong> {{('to_add_pathways' | translate) }}</p>
          </div>
        </mat-card-content>
        <mat-card-actions>
        </mat-card-actions>
  
      </mat-card>
    </div>
  </div>
