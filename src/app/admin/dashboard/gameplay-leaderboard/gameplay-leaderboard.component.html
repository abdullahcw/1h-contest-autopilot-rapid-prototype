
<div class="content-wrapper-right">
  <div style="height: calc(100vh - 332px); overflow-y: auto;" id="container">
    <table mat-table aria-describedby="" [dataSource]="gamePlay" class="responsive-table" matSort
       matSortActive="" matSortDirection="asc" matSortDisableClear
      [ngClass]="{'disabled-style': is_loading}" *ngIf="totalCount">
    
      <ng-container matColumnDef="rank">
        <th id="" mat-header-cell *matHeaderCellDef>
          {{'rank' | translate}}
        </th>
        <td mat-cell *matCellDef="let player" class="game-name-holder">
          <p class="large-content">
            {{player.player_rank}}
          </p>
        </td>
      </ng-container>

      <ng-container matColumnDef="player_logo">
        <th id="" mat-header-cell *matHeaderCellDef class="checkboxes game-logo-holder"></th>
        <td mat-cell *matCellDef="let player">
          <app-custom-images-table-static class="img-wrapper"  [ImageSrc]="player.profile_image_url" > </app-custom-images-table-static> 
        </td>
      </ng-container>

      <ng-container matColumnDef="player">
        <th id="" mat-header-cell *matHeaderCellDef class="player-column">
          {{'player' | translate}}
        </th>
        <td mat-cell *matCellDef="let player" class="player-name-holder">
          <p class="player-name-holder"
            #elements matTooltip="{{player.first_name}} {{player.last_name}}" [matTooltipShowDelay]="500" [matTooltipDisabled]="elements.offsetWidth >= elements.scrollWidth" >

            {{player.first_name}} {{player.last_name}}
          </p>
        </td>
      </ng-container>
      <ng-container matColumnDef="points">
        <th id="" mat-header-cell *matHeaderCellDef class="points-column">
          {{'points' | translate}}
        </th>
        <td mat-cell *matCellDef="let player" class="game-name-holder">
          <p class="points-earned">
            <app-numbers [value]="player.total_points"></app-numbers>      
          </p>
        </td>
      </ng-container>
      <ng-container matColumnDef="games">
        <th id="" mat-header-cell *matHeaderCellDef>{{'games' | translate}}
        </th>
        <td mat-cell *matCellDef="let player" class="game-name-holder">
          <p class="medium-content">
            <app-numbers [value]="player.games_played"></app-numbers>
          </p>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="header"></tr>
      <tr mat-row *matRowDef="let player; columns: displayedColumns;" class="game-row pointerDefault"></tr>
    </table>
    <div class="no_messages" *ngIf="!totalCount">
      <p>{{('no_gameplay' | translate)}}</p>
    </div>
  </div>
  <div class="button-row">
    <div class="btn-right">
      <button type="button" mat-button class="cancel-button" tabindex="-1" 
        (click)="viewAll()">{{'view_detail_report' | translate}}</button> 
    </div>
  </div>
</div>
