<div class="content-wrapper-right">
    <div style="height: calc(100vh - 332px); overflow-y: auto;" id="container">
      <table mat-table aria-describedby="" [dataSource]="pinnedGames" class="responsive-table" matSort
         matSortActive="" matSortDirection="asc" matSortDisableClear
        [ngClass]="{'disabled-style': is_loading}" *ngIf="totalCount">
      
        <ng-container matColumnDef="no">
          <th id="" mat-header-cell *matHeaderCellDef>
            {{'number_shortform' | translate}}
          </th>
          <td mat-cell *matCellDef="let item;let i = index" class="srNo">            
            <span>
              {{i + 1}}
            </span>
          </td>
        </ng-container>
  
        <ng-container matColumnDef="game_logo">
          <th  mat-header-cell *matHeaderCellDef class="checkboxes game-logo-holder"></th>
          <td mat-cell *matCellDef="let item">        
            <app-custom-images-table class="img-wrapper" [className]="'img40by40'"  [ImageSrc]="item?.game_logo" > </app-custom-images-table>  
          </td>
        </ng-container>
  
        <ng-container matColumnDef="game_name">
          <th id="" mat-header-cell *matHeaderCellDef class="player-column">
            {{'game' | translate}}
          </th>
          <td mat-cell *matCellDef="let item" class="player-name-holder">
            <p class="player-name-holder large-content"
              #elements matTooltip="{{item.game_name}}" [matTooltipShowDelay]="500" [matTooltipDisabled]="elements.offsetWidth >= elements.scrollWidth" >  
              {{item.game_name}} 
            </p>
          </td>
        </ng-container>
        <ng-container matColumnDef="win_rate">
          <th id="" mat-header-cell *matHeaderCellDef class="points-column" style="text-align: center;">
            {{'win_rate' | translate}}
          </th>
          <td mat-cell *matCellDef="let item" style="text-align: center;">
            <p class="points-earned">
              {{item.win_rate != '-1' ? item.win_rate : '--'}}
            </p>
          </td>
        </ng-container>       
        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="header"></tr>
        <tr mat-row *matRowDef="let item; columns: displayedColumns;" class="game-row pointerDefault"></tr>
      </table>
      <div class="no_messages" *ngIf="!totalCount">
        <span >{{('no_game_pinned_button' | translate)}}</span>
      </div>
    </div>
    <div class="button-row">
      <div class="btn-right">
        <button type="button" mat-button class="cancel-button" tabindex="-1" 
          (click)="edit()">{{'edit' | translate}}</button> 
      </div>
    </div>
  </div>
