<div class="contestCircleChartWrapper">
  <div class="leftDiv">
    <div class="canvasDiv">
      <canvas id="circleChart" #circleChart></canvas>
    </div>
  </div>
  <div class="rightDiv">
    <div class="contentText">
      <span class="percent">{{completion?.completion + '%'}}</span>
      <span class="completeText">{{'of_games' | translate}}</span>
      <span class="completeText">{{'completed' | translate}}</span>

    </div>
  </div>
</div>
