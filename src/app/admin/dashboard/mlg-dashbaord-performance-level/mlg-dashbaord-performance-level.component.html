<div class="content-wrapper-right" [ngClass]="{'disabled-style': isLoading}">
    <div class="mlg-performance">
        <table mat-table aria-describedby="" [dataSource]="levels" class="responsive-table"
            [ngClass]="{'disabled-style': isLoading}">
    
            <ng-container matColumnDef="level">
                <th id="" mat-header-cell *matHeaderCellDef  class="game-level-column">
                    {{'level' | translate}}
                </th>
                <td mat-cell *matCellDef="let game" class="game-level-holder">
                    <p class="large-content">
                        {{ game.level }}
                    </p>
                </td>
            </ng-container>
    
            <ng-container matColumnDef="game_logo">
                <th id="" mat-header-cell *matHeaderCellDef class="game-logo-column"></th>
                <td mat-cell *matCellDef="let game" class="game-logo-holder">
                    <div class="game-logo-content">
                        <img class="game-logo" appSignedUrl [imgSelector]="'changeImageSrc'" [imgSrcValue]="game.game_image_url" onError="this.src='/assets/img/default.png'" src="/assets/img/default.png" alt=""/>
                        <img src="../../../../assets/img/disabled_level.png" alt="" *ngIf="game.is_disabled" class="disabled-logo">
                    </div>
                </td>
            </ng-container>
    
            <ng-container matColumnDef="game">
                <th id="" mat-header-cell *matHeaderCellDef class="game-column">
                    {{'game' | translate}}
                </th>
                <td mat-cell *matCellDef="let game" class="game-name-holder">
                    <div class="game-name-container">
                        <p class="game-name-holder" [ngClass]="{'disabled-game': game.is_disabled}" 
                        #elements matTooltip="{{game.game_name}}" [matTooltipShowDelay]="500" [matTooltipDisabled]="elements.offsetWidth >= elements.scrollWidth" >{{ game.game_name }}</p>
                        <span class="disabled-game-text" *ngIf="game.is_disabled">(Disabled)</span>
                    </div>
                </td>
            </ng-container>
            <ng-container matColumnDef="high_score">
                <th id="" mat-header-cell *matHeaderCellDef class="high_score_column">{{'average_score' | translate}}
                </th>
                <td mat-cell *matCellDef="let game" class="high-score-holder">
                    <p class="medium-content" [ngClass]="{'disabled-game': game.is_disabled}">
                        {{ game.average_high_score < 0 ? '--' : (game.average_high_score + '%')}}
                    </p>
                </td>
            </ng-container>
            <ng-container matColumnDef="players_won">
                <th id="" mat-header-cell *matHeaderCellDef class="points-column">
                    {{'players_won' | translate}}
                </th>
                <td mat-cell *matCellDef="let game" class="players-won-holder">
                    <p class="points-earned" [ngClass]="{'disabled-game': game.is_disabled}">
                        {{ game.players_won < 0 ? '--' : (game.players_won + '%')}}
                    </p>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="header"></tr>
            <tr mat-row *matRowDef="let game; columns: displayedColumns;" class="game-row pointerDefault"></tr>
        </table>
    </div>
</div>
