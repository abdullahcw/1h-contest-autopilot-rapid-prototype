<div class="main_container">
  <div class="wrapper">
    <mat-card class="container-card">
      <mat-card-header>
        <mat-toolbar class="toolbar">
          <mat-toolbar-row>
            <span class="title"><span class=""> {{'showing_all_Game_categories' | translate}}</span></span>
            <span class="spacer"></span>
            <button class="add-group addEntity" *ngIf="categoryPermission?.add"
              matTooltip="{{'add_new_category' |translate}}" matTooltipPosition="below"
              (click)="presentCategoryPopup(null,translate.instant('add_new_category'),'addCategory')" mat-fab>
              <mat-icon>add</mat-icon>
            </button>
          </mat-toolbar-row>
        </mat-toolbar>
      </mat-card-header>
      <mat-progress-bar class="progress-bar" mode="indeterminate" *ngIf="is_loading"></mat-progress-bar>
      <mat-card-content>
        <table mat-table [dataSource]="dataSource" matSort matSortDirection="asc" matSortDisableClear>
          <ng-container matColumnDef="serial">
            <th mat-header-cell *matHeaderCellDef style="min-width: 60px;width: 140px;height: 46px;padding-left: 34px;">
              {{'no' | translate}}.</th>
            <td mat-cell *matCellDef="let category = index">
              {{category + 1}}
            </td>
          </ng-container>
          <ng-container matColumnDef="categoryName">
            <th mat-header-cell *matHeaderCellDef style="width: 350px;">
              {{'category_name' | translate}}</th>
            <td mat-cell *matCellDef="let category">
              {{category.category_name}}
            </td>
          </ng-container>
          <ng-container matColumnDef="gameCount">
            <th mat-header-cell *matHeaderCellDef style="max-width:100px;">
              {{'no_of_games' | translate}}</th>
            <td mat-cell *matCellDef="let category">
              <app-numbers [value]="category.number_of_games"></app-numbers>
            </td>
          </ng-container>
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef style="text-align: right;width: 100px;">
              {{'delete' | translate}}
            </th>
            <td mat-cell *matCellDef="let category" (click)="$event.stopPropagation();">
              <img src="/assets/img/icon/delete-category-icon.png" alt="" class="delete-icon"
                (click)="categoryDeletionValidation(category)"
                *ngIf="category.is_editable && categoryPermission && categoryPermission.delete">
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns sticky: true" class="header"></tr>
          <tr mat-row *matRowDef="let category; columns: displayedColumns;"
            (click)="presentCategoryPopup(category, translate.instant('edit_category'), 'editCategory')" [ngClass]="{'selected-row-styling': (selection && selection.selected.indexOf(category)-1),
            'notHandCursor' : !category.is_editable || !categoryPermission.edit}">
          </tr>
        </table>
      </mat-card-content>
      <mat-card-actions>
      </mat-card-actions>

    </mat-card>
  </div>
</div>
