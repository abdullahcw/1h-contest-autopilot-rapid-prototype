<div class="main-container">

  <mat-toolbar-row class="mlg-header" [ngClass]="{'header': multilevelGameData?.mlg_state !== 'LIVE'}" >
    <div class="mlg-header-conatiner">
      <div class="mlg-title-container">
        <div class="mlg-icon-wrapper" (click)="imgInput && imgInput?.click()">
          <div class="mlg-icon-container">
            <img class="mlg-icon" 
            [src]="mlgBannerImg"            
            onError="this.src='/assets/img/contest-banner-image.png'"  >
            <div class="mlg-icon-overlay">
              <mat-icon>edit</mat-icon>
            </div>
          </div>
        </div>
        
        
        <div class="mlg-name-holder-wrapper" [ngClass]="{'name-holder-wrapper': multilevelGameData?.mlg_state !== 'LIVE'}" >
          <div class="mlg-name-holder" [ngClass]="{'name-holder': multilevelGameData?.mlg_state !== 'LIVE'}" >
            <input type="text" class="mlg-name" [(ngModel)]="multilevelGameData.mlg_name"
              (keyup.enter)="$event.target.blur()" (change)="hasChanged = true" (blur)="hasChanged ?
          gameNameValidation('mlg_name',
          multilevelGameData?.mlg_name) :
          false" placeholder="{{'multilevel_title_placeholder' | translate}}" minlength="1" maxlength="45"
              value="multilevel Game">
            <mat-icon class="edit-input-icon">edit</mat-icon>
            </div>
        </div>
      </div>
      <div class="last-two-col" [ngClass]="{'last-col': multilevelGameData?.mlg_state !== 'LIVE' || globalService.isRoleLimited()}">

        <div class="button-row" *ngIf="multilevelGameData?.mlg_state === 'LIVE' && !globalService.isRoleLimited()" >
          <div class="btn-right">
             <button type="button" mat-button class="cancel-button" tabindex="-1" (click)="callCancel()"
              >{{'cancel' | translate}}</button>
          </div>
          <div>
              <button type="button" mat-raised-button class="save-button robotoRegular" (click)="openUpdatePopUp()"  [ngClass]="{'disabled-save': !disableSave }">
                {{'save' | translate}}
              </button>
          </div>
        </div>
      
        <div class="mlg-options-container" [ngClass]="{'property-icons': multilevelGameData?.mlg_state !== 'LIVE'}"  >
          <div class="buttons-div" >
            <div class="togglebtn">
              <div class="lockUnlockBtn" (click)="onMlgLockUnlockChanged()" 
              [ngClass]="{'property-icon-filled': multilevelGameData?.is_mlg_preview_locked,
            'no-hand-cursor':(access_type === 'MM' && !multilevelGameData?.is_mlg_preview_locked)}">
                <mat-icon class="material-symbols-outlined" *ngIf="multilevelGameData?.is_mlg_preview_locked">
                  lock
                </mat-icon>   
                <mat-icon class="material-symbols-outlined" *ngIf="!multilevelGameData?.is_mlg_preview_locked">
                  lock_open
                </mat-icon>                   
              </div>
            </div>
            <div class="property-icon-holder" matTooltip="{{'rules_btn' | translate}}" matTooltipPosition="below"
            [ngClass]="{'property-icon-filled': multilevelGameData?.mlg_rule,
            'no-hand-cursor':(access_type === 'MM' && !multilevelGameData?.mlg_rule)}"
             (click)="(access_type === 'MM' && !multilevelGameData?.mlg_rule)? $event.stopPropagation() :openRulesDialog()">
            <mat-icon>
              assignment
            </mat-icon>
            </div>
          <div class="property-icon-holder" matTooltip="{{'add_players_uppercase' | translate}}"
            matTooltipPosition="below" (click)="(access_type === 'MM' && multilevelGameData?.mlg_state !== 'LIVE') ? $event.stopPropagation() : checkMultilevelGameReadiness()"
            [ngClass]="{'property-icon-filled': multilevelGameData?.mlg_state === 'LIVE','no-hand-cursor':(access_type === 'MM' && multilevelGameData?.mlg_state !== 'LIVE')}"
            >
            <mat-icon>person_add</mat-icon>
          </div>
          <div class="property-icon-trophy" matTooltip="{{'trophy_uppercase' | translate}}" matTooltipPosition="below"
            [ngClass]="{'property-icon-filled': true}" (click)="openTrophyDialog()">
            <div class="custom-icon">
              <svg class="icon assets-icon trophy-icon" viewBox="0 0 1025 1024" version="1.1"
                xmlns="http://www.w3.org/2000/svg">
                <path style="fill: white;"
                  d="M1023.688521 163.069182c-0.118455-6.478285-0.22772-12.073261-0.22772-16.785948L838.696919 146.283234c3.566937-79.126168 1.38266-140.4973 1.38266-140.4973-0.11335-3.181957-2.811274-5.785934-5.995273-5.785934L514.003507 0c-0.776087 0-1.53073 0.050037-2.287415 0.132752-0.754643-0.083736-1.516433-0.132752-2.287415-0.132752L188.517669 0c-3.184 0-5.881924 2.602955-5.996294 5.785934 0 0-2.188361 61.371132 1.380618 140.4973L6.319981 146.283234c-3.184 0-5.908474 0-6.054501 0s-0.265503 2.604998-0.265503 5.788997l0 35.390594c0 3.184 0 5.965659 0 6.182147 0 0.216487 0 2.998147 0 6.182147l0 13.814351c0 3.184 0.165429 5.788997 0.36762 5.788997l0 0c1.851376 59.648423 11.381931 139.426096 51.048152 221.094971 33.639293 69.271904 82.081426 127.230295 143.991735 172.26173 51.248301 37.289966 109.799991 64.145644 174.178461 80.19533 37.178658 39.676434 73.841627 61.555964 105.840925 70.351278l0 81.423794c-4.563597 24.191453-32.314839 106.100302-225.747409 106.100302l-24.458999 0c-3.184 0-5.788997 2.604998-5.788997 5.788997l0 61.56107c0 3.184 2.604998 5.788997 5.788997 5.788997l573.558006 0c3.184 0 5.788997-2.604998 5.788997-5.788997L804.567467 956.648912c0-3.184-2.604998-5.788997-5.788997-5.788997l-24.331353 0c-226.931963 0-225.929176-106.977484-225.929176-106.977484 0.029614-3.184 0.054122-8.393995 0.054122-11.577995L548.572062 763.321522c31.994192-8.781017 67.949492-30.572727 104.937192-70.042885 64.845144-16.009861 123.592897-42.972762 175.166951-80.489426 61.892949-45.037562 110.310574-102.994932 143.944761-172.271942C1026.751001 329.068093 1024.738281 221.081695 1023.688521 163.069182zM117.172795 408.557797c-33.055185-68.064884-41.707535-136.560701-43.602822-189.126308l115.397009 0c1.988213 20.373308 4.4962 40.457627 7.677136 59.377814 19.455279 115.90555 46.192502 218.273485 96.804616 308.59471C216.108587 548.227952 155.362409 487.202995 117.172795 408.557797zM906.824095 408.557797c-38.415292 79.105745-99.656736 140.397226-177.663705 179.543674 50.778564-90.               </svg>
            </div>
           </div>
         </div>
       </div>
     </div>
   </div> 

  </mat-toolbar-row>
</div>

<input type="file" onclick="this.value=null" #imgInput id="upload_image" [hidden]="true" accept="image/*"
  (change)="fileChangeEvent($event)">
