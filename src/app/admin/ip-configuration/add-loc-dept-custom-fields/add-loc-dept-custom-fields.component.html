<section class="master-wrapper">
    <mat-toolbar class="small-toolbar" color="primary">
      <div>{{'add_exclusion' | translate}}</div>
    </mat-toolbar>
    <div class="wrapper">
      <mat-progress-bar class="progress-bar" mode="indeterminate" *ngIf="is_loading"></mat-progress-bar>
  
      <div class="main-container">
        <div class="search-container">
          <div class="chip-wrapper" [ngClass]="{'disabled-style': is_loading}">
            <app-search class="filter-chip name" placeholder_text="{{ 'add' | translate}}" [shouldAllowMultiline]="true"
              style="width:100%; position: relative;" [filter_options]="filter_options" [dataSource]="menuList"
              (getDataSourceWithFilterDetails)="getDataSource($event)" [applied_filters]="appliedFilters" [isFossilCustomField]="true"
              (getDataSourceWithSearchKey)="getDataSourceWithSearchKey($event)" 
              (filtersUpdated)="refreshListOnFilterChange($event)" [context]="context"></app-search>
          </div>
        </div>
      </div>
   
      <div class="button-row">
        <div class="btn-right">
          <button type="button" mat-button class="cancel-button" tabindex="-1"
            (click)="cancel()">{{'cancel_uppercase' | translate}}</button>
        </div>
        <div>
          <button type="submit" mat-button (click)="save()">
            {{'done_uppercase' | translate }}
          </button>
        </div>
      </div>
    </div>
  </section>
