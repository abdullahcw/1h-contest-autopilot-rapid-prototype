<div class="main-container">
  <mat-toolbar class="small-toolbar" color="primary">
    <div>{{ disableEmail ? ('select_end_date' | translate) : ('send_by_email' | translate) }}</div>
  </mat-toolbar>
  <mat-progress-bar class="progress-bar" mode="indeterminate" *ngIf="is_loading"></mat-progress-bar>
  <section class="add-group-content" [ngClass]="{'disabled-style': is_loading}">
    <form #setDateForm="ngForm">
      <div class="container" [ngClass]="{'disable-date': data?.context}">
        <div class="form-group department-container date-picker">
          <label class="label roboto_regular"
            for="startDate">{{disableEmail ? ('from' | translate) : ('start_date' | translate) }}</label>
          <input matInput class="holder form-inputs calendar-input" [matDatepicker]="startDatePicker"
            placeholder="{{'date_format_mmddyyyy' | translate}}" name="startDate" (click)="startDatePicker.open()"
            (open)="isDatePickerOpen" [(ngModel)]="startDate" (keydown)="isDatePickerOpen = true;"
            (dateChange)="startDateChanged(startDate)" readonly [max]="!data?.context ? today : null" required
            [readonly]="data?.context">
          <mat-datepicker-toggle matPrefix [for]="startDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #startDatePicker></mat-datepicker>
        </div>
        <div class="form-group department-container date-picker">
          <label class="label roboto_regular"
            for="endDate">{{disableEmail ? ('to' | translate) : ('end_date' | translate) }}</label>
          <input matInput class="holder form-inputs calendar-input" [matDatepicker]="endDatepicker"
            placeholder="{{'date_format_mmddyyyy' | translate}}" name="endDate" (click)="endDatepicker.open()"
            (open)="isDatePickerOpen" [min]="!data?.context ? startDate : null" (keydown)="isDatePickerOpen = true;"
            [(ngModel)]="endDate" readonly [max]="disableEmail ? null :!data?.context ? today : null"
            (dateChange)="endDateChanged(endDate)" required [readonly]="data?.context">
          <mat-datepicker-toggle matPrefix [for]="endDatepicker"></mat-datepicker-toggle>
          <mat-datepicker #endDatepicker></mat-datepicker>
        </div>
        <div class="form-group name-field" *ngIf="!disableEmail">
          <label class="label roboto_regular" for="emailId">{{'email_ids' | translate}}</label>
          <mat-form-field class="email-container" (click)="emailInput.focus()">
            <mat-chip-list #chipList>
              <mat-chip *ngFor="let email of emails" [selectable]="true" [removable]="true"
                (removed)="removeFilter(email)">{{email}}<mat-icon class="cancel-chip" matChipRemove>cancel</mat-icon>
              </mat-chip>
              <div class="add-filter-indicator" *ngIf="!is_editing" (click)="is_editing = true;">
                <mat-icon>add</mat-icon><span>{{'add_email' | translate}}</span>
              </div>
              <input #emailInput type="email" name="emailInput" [matChipInputFor]="chipList" (blur)="is_editing = false"
                [matChipInputSeparatorKeyCodes]="separatorKeysCodes" [matChipInputAddOnBlur]="true" email
                (focus)="is_editing = true;" (matChipInputTokenEnd)="addEmailChip($event)" pattern="\S+@\S+\.\S+"
                required>
            </mat-chip-list>
          </mat-form-field>
        </div>
      </div>
      <div class="button-row">
        <div class="btn-right">
          <button type="button" mat-button class="cancel-button" tabindex="-1"
            (click)="cancelDialog()">{{'cancel_uppercase' | translate}}</button>
        </div>
        <div>
          <button type="submit" mat-button (click)="emailInput?.blur(); sendEmail()"
            [disabled]="!setDateForm.valid || emails?.length === 0" *ngIf="!disableEmail">
            <div> {{'send_email_uppercase' | translate}} </div>
          </button>
          <button type="submit" mat-button [disabled]="!setDateForm.valid" *ngIf="disableEmail" (click)="sendDate()">
            <div> {{'done_uppercase' | translate}}</div>
          </button>
        </div>
      </div>
    </form>
  </section>
</div>
