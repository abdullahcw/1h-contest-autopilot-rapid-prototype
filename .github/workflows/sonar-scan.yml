name: Sonar-scan
on:
  push:
   branches: 
      - '*'
  pull_request:
    branches: 
      - master
      - devRelease
      - qaRelease
      - stageRelease
   
    
jobs:
  build:
    name: Build-Run-SonarScan
    runs-on: sonar17
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: sonarsource/sonarqube-scan-action@master
        with:
          args: -Dsonar.projectKey=1huddle-admin-client_Admin-Panel
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
